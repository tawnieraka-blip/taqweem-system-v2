<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>مدير القسم</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/managers.css">

</head>

<body>

<div class="dashboard">

    <!-- Header -->

    <header class="header">

        <div class="header-left">

            <img src="assets/logo.png" class="logo" alt="Logo">

        </div>

        <div class="header-center">

            <h1>

                منصة إدارة التقويم والمتابعة

            </h1>

            <span id="departmentName">

                مدير قسم الإعلام

            </span>

        </div>

        <div class="header-right">

            <button class="icon-btn" id="themeBtn">

                <i class="fa-regular fa-moon"></i>

            </button>

        </div>

    </header>

    <!-- Time -->

    <section class="datetime-card">

        <div class="time-box">

            <i class="fa-regular fa-clock"></i>

            <div>

                <h2 id="clock">

                    --:--

                </h2>

                <span id="day">

                    الأحد

                </span>

            </div>

        </div>

        <div class="date-box">

            <i class="fa-regular fa-calendar"></i>

            <div>

                <h3 id="date">

                    --

                </h3>

                <span id="hijri">

                    --

                </span>

            </div>

        </div>

    </section>

    <!-- Statistics -->

    <section class="stats">

        <div class="stat-card">

            <div class="stat-icon blue">

                <i class="fa-solid fa-file-lines"></i>

            </div>

            <h2 id="reportsCount">

                0

            </h2>

            <p>

                تقارير القسم

            </p>

        </div>

        <div class="stat-card">

            <div class="stat-icon green">

                <i class="fa-solid fa-users"></i>

            </div>

            <h2 id="employeesCount">

                0

            </h2>

            <p>

                موظفو القسم

            </p>

        </div>

        <div class="stat-card">

            <div class="stat-icon orange">

                <i class="fa-solid fa-calendar-week"></i>

            </div>

            <h2 id="weekReports">

                0

            </h2>

            <p>

                هذا الأسبوع

            </p>

        </div>

    </section>

    <!-- Latest Reports -->

    <section class="reports-card">

        <div class="section-title">

            <h3>

                آخر تقارير القسم

            </h3>

        </div>

        <div id="reportsList">

        </div>

    </section>

</div>

<!-- Bottom Navigation -->

<nav class="bottom-nav">

    <a href="managers.html" class="active">

        <i class="fa-solid fa-house"></i>

        <span>

            الرئيسية

        </span>

    </a>

    <a href="reports.html">

        <i class="fa-solid fa-file-lines"></i>

        <span>

            التقارير

        </span>

    </a>

    <a href="employee.html">

        <i class="fa-solid fa-users"></i>

        <span>

            الموظفون

        </span>

    </a>

    <a href="index.html">

        <i class="fa-solid fa-right-from-bracket"></i>

        <span>

            خروج

        </span>

    </a>

</nav>

<script src="js/config.js"></script>

<script src="js/common.js"></script>

<script src="js/api.js"></script>

<script src="js/managers.js"></script>

</body>

</html>
